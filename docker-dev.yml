services:
  systems-architect-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: systems-architect-dev
    ports:
      - "2351:3000"
    volumes:
      # Mount source code for hot reload
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - systems-architect-network
    command: npm run dev

networks:
  systems-architect-network:
    driver: bridge
