services:
  systems-architect:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: systems-architect
    ports:
      - "2350:2350"
    environment:
      # Google Analytics 4 Measurement ID (optional)
      - GA_MEASUREMENT_ID=${GA_MEASUREMENT_ID:-}
    restart: unless-stopped
    networks:
      - systems-architect-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2350/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  systems-architect-network:
    driver: bridge
