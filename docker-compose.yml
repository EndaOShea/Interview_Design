services:
  architectai:
    build:
      context: .
      dockerfile: Dockerfile
      # No build args needed - API key loaded at runtime
    container_name: architectai-system-design
    ports:
      - "2350:2350"
    environment:
      # Runtime environment variable - NOT baked into image
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped
    networks:
      - architectai-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2350/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  architectai-network:
    driver: bridge
